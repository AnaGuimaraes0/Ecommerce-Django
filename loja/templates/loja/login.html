{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="login-container">
    <h2>Acessar sua Conta</h2>

    <form method="post">
        {% csrf_token %}

        {%for field in form %}
            <div class="login-container">
                <label>{{ field.label}}</label>
                {{ field }}
                {% if field.errors | striptags %}
                    <span style="color: red;">{{ field.errors}}</span>
                {% endif %}
            </div>
        {% endfor%}
        <button type="submit" class="btn btn-sucess">Fazer Login</button>
    </form>
</div>

{% endblock %}
