{% extends 'base.html' %}

{% block title %}Ecommerce{% endblock %}

{% block content %}
    
    <h2>Clientes</h2>
    <div>
        {% for cliente in clientes %}
            <h4>{{ cliente.nome }}</h4>
            <p>{{ cliente.email }}</p>
            <p>{{ cliente.telefone }}</p>
            <p>{{ cliente.endereco }}</p>
        {% endfor %}

        <button id="id-cliente" class="btn btn-primary mb-2">Botão Cliente</button>
    </div>
    
{% endblock %}
